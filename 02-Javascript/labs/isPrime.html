<script>
  let n = Number(prompt("Enter n"));

  if (n <= 1) {
    alert("ENTER A NUMBER GREATER THAN 1");
  } else {
    let result = "";
    for (let i = 2; i <= n; i++) {
      let isPrime = true;

      for (let j = 2; j < i; j++) {
        if (i % j === 0) {
          isPrime = false;
          break;
        }
      }
      if (isPrime) {
        result += i + " ";
      }
    }
    alert(result);
  }
</script>
