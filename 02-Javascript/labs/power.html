<script>
  let x = Number(prompt("Enter X:"));
  let n = Number(prompt("Enter n:"));
  function pow(x, n) {
    if (n == 0) {
      return 1;
    }
    let answer = 1;
    for (let i = 0; i < n; i++) {
      answer *= x;
    }
    return answer;
  }
  let result = pow(x, n);
  alert(result);
</script>
