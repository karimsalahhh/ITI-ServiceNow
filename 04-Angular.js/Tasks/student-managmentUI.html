<!doctype html>
<html lang="en" ng-app="studentApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management UI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  </head>
<body ng-controller="mainCtrl" class="bg-light">
  <div class="container py-5" style="max-width: 700px">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-4">Student Management</h3>

        <div class="row g-2 mb-3">
          <div class="col-md-7">
            <input
              type="text"
              ng-model="searchText"
              class="form-control"
              placeholder="Search by name"
            />
          </div>

          <div class="col-md-5">
            <select ng-model="sortKey" class="form-select">
              <option value="name">Sort by Name</option>
              <option value="grade">Sort by Grade (asc)</option>
              <option value="-grade">Sort by Grade (desc)</option>
            </select>
          </div>
        </div>

        <p class="text-muted mb-2" ng-show="(students | filter:searchText).length === 0">
          No students found
        </p>

        <ul class="list-group">
          <li
            class="list-group-item d-flex justify-content-between align-items-center"
            ng-repeat="student in students | filter:searchText | orderBy:sortKey"
          >
            <span>{{ student.name }}</span>

            <span
              class="badge rounded-pill"
              ng-class="{
                'text-bg-success': student.grade > 80,
                'text-bg-danger': student.grade < 50,
                'text-bg-secondary': student.grade >= 50 && student.grade <= 80
              }"
            >
              {{ student.grade }}
            </span>
          </li>
        </ul>
      </div>
    </div>
  </div>

</body>
    <script>
      var app = angular.module("studentApp", []);
      app.controller("mainCtrl", function ($scope) {
        $scope.sortKey = "name";
        $scope.students = [
          { name: "Karim", grade: 100 },
          { name: "Dareen", grade: 20 },
          { name: "Abdo", grade: 90 },
          { name: "Reem", grade: 80 }
        ];
      });
    </script>
  </body>
</html>
