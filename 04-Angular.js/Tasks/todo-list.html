<!doctype html>
<html lang="en" ng-app="todoApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  </head>
  <body ng-controller="mainCtrl">
    <todo-list tasks="tasks"></todo-list>

    <script>
      var app = angular.module("todoApp", []);
      app.controller("mainCtrl", function ($scope) {
        $scope.tasks = [
          { title: "Study AngularJS", done: false },
          { title: "Finish Student UI", done: true },
          { title: "Push to GitHub", done: false },
        ];
      });

      app.directive("todoList", function () {
        return {
          scope: {
            tasks: "=",
          },
          template: `
        <div class="container py-4" style="max-width: 600px">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="mb-3">Todo List</h4>

              <div class="input-group mb-3">
                <input class="form-control"
                       placeholder="New task"
                       ng-model="newTaskTitle">
                <button class="btn btn-dark" ng-click="addTask()">Add</button>
              </div>

              <p class="text-muted" ng-show="tasks.length === 0">No tasks yet</p>

              <ul class="list-group" ng-show="tasks.length > 0">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    ng-repeat="t in tasks track by $index">

                  <div class="d-flex align-items-center"
                       ng-class="{ 'text-decoration-line-through text-muted': t.done }">
                    <input type="checkbox" class="form-check-input me-2" ng-model="t.done">
                    <span>{{t.title}}</span>
                  </div>

                  <button class="btn btn-outline-danger btn-sm"
                          ng-click="removeTask($index)">
                    Delete
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      `,
          controller: function ($scope) {
            $scope.newTaskTitle = "";
            $scope.addTask = function () {
              var title = ($scope.newTaskTitle || "").trim();
              if (title === "") return;
              $scope.tasks.push({ title: title, done: false });
              $scope.newTaskTitle = "";
            };
            $scope.removeTask = function (index) {
              $scope.tasks.splice(index, 1);
            };
          },
        };
      });
    </script>
  </body>
</html>
