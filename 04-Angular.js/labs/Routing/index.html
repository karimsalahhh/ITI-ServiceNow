<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routing Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body ng-app="productApp" ng-controller="MainController">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="#!/users">Routing Lab</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <div class="navbar-nav ms-auto">
            <a
              class="nav-link"
              ng-class="{active: $location.path() === '/users'}"
              href="#!/users"
              >Users</a
            >
            <a
              class="nav-link"
              ng-class="{active: $location.path() === '/about'}"
              href="#!/about"
              >About</a
            >
          </div>
        </div>
      </div>
    </nav>

    <main class="content-shell py-4">
      <div class="container">
        <div ng-view></div>
      </div>
    </main>

    <footer class="bg-success text-white py-3 mt-auto shadow-sm">
      <div class="container text-center">
        <small
          >&copy; 2026 Routing Lab &mdash; Powered by AngularJS &amp;
          Bootstrap</small
        >
      </div>
    </footer>

    <script src="https://code.angularjs.org/1.8.2/angular.min.js"></script>
    <script src="https://code.angularjs.org/1.8.3/angular-route.min.js"></script>

    <script src="app.js"></script>
    <script src="services/UserService.js"></script>
    <script src="controller/AboutController.js"></script>
    <script src="controller/UserController.JS"></script>
    <script src="controller/UserDetailController.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .content-shell {
        min-height: calc(100vh - 72px);
      }
    </style>
  </body>
</html>
