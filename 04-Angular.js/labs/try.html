<!DOCTYPE html>
<html ng-app="studentApp">
<head>
  <meta charset="UTF-8" />
  <title>Students</title>

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body ng-controller="mainCtrl" class="bg-light">

  <div class="container mt-5">
    <div class="card shadow p-4">

      <h2 class="text-center mb-4">Student List</h2>

      <!-- Input + Button -->
      <div class="input-group mb-3">
        <input 
          type="text" 
          class="form-control"
          ng-model="studentName" 
          placeholder="Type a name" 
        />

        <button 
          class="btn btn-primary"
          ng-click="addStudent()" 
          ng-disabled="!studentName || studentName.trim().length == 0">
          Add
        </button>
      </div>

      <!-- No Students Message -->
      <div class="alert alert-secondary text-center" ng-hide="students.length > 0">
        No students added yet.
      </div>

      <!-- Students List -->
      <ul class="list-group" ng-show="students.length > 0">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            ng-repeat="s in students">
          
          {{s}}

          <button class="btn btn-danger btn-sm"
                  ng-click="deleteStudent($index)">
            Delete
          </button>
        </li>
      </ul>

    </div>
  </div>

  <script>
    var studentApp = angular.module("studentApp", []);

    studentApp.controller("mainCtrl", function ($scope) {
      $scope.students = [];   // start empty
      $scope.studentName = "";

      $scope.addStudent = function () {
        if (!$scope.studentName || $scope.studentName.trim().length == 0) return;

        $scope.students.push($scope.studentName.trim());
        $scope.studentName = "";
      };

      $scope.deleteStudent = function (i) {
        $scope.students.splice(i, 1);
      };
    });
  </script>

</body>
</html>
